services:
  asr-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
        ENABLE_PARAKEET_RUNTIME: ${ENABLE_PARAKEET_RUNTIME:-}
        ENABLE_NEMO_RUNTIME: ${ENABLE_NEMO_RUNTIME:-}
    env_file:
      - path: .env
        required: false
    ports:
      - "${PORT:-8080}:8080"
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8080}
      SAMPLE_RATE: ${SAMPLE_RATE:-16000}
      ASR_BACKEND: ${ASR_BACKEND:-faster-whisper}
      ASR_MODEL_SIZE: ${ASR_MODEL_SIZE:-base.en}
      ASR_DEVICE: ${ASR_DEVICE:-cpu}
      ASR_COMPUTE_TYPE: ${ASR_COMPUTE_TYPE:-int8}
      ASR_VAD_FILTER: ${ASR_VAD_FILTER:-true}
      LOCAL_STT_SOCKET_MODE: ${LOCAL_STT_SOCKET_MODE:-tcp}
      LOCAL_STT_UDS_PATH: ${LOCAL_STT_UDS_PATH:-/run/rtc-asr/stt.sock}
      LOCAL_STT_RAW_UDS_ENABLED: ${LOCAL_STT_RAW_UDS_ENABLED:-false}
      LOCAL_STT_RAW_UDS_PATH: ${LOCAL_STT_RAW_UDS_PATH:-/run/rtc-asr/stt.raw.sock}
      ASR_PRELOAD_MODEL: ${ASR_PRELOAD_MODEL:-false}
      ASR_QWEN_MODEL: ${ASR_QWEN_MODEL:-Qwen/Qwen3-ASR-0.6B}
      ASR_QWEN_DTYPE: ${ASR_QWEN_DTYPE:-auto}
      ASR_QWEN_DEVICE_MAP: ${ASR_QWEN_DEVICE_MAP:-}
      ASR_QWEN_MAX_NEW_TOKENS: ${ASR_QWEN_MAX_NEW_TOKENS:-256}
      ASR_QWEN_MAX_INFERENCE_BATCH_SIZE: ${ASR_QWEN_MAX_INFERENCE_BATCH_SIZE:-1}
      ASR_PARAKEET_MODEL: ${ASR_PARAKEET_MODEL:-nvidia/parakeet-tdt-0.6b-v3}
      ASR_PARAKEET_DTYPE: ${ASR_PARAKEET_DTYPE:-auto}
      HF_HOME: /app/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /app/.cache/huggingface/hub
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN:-}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-}
    healthcheck:
      test: ["CMD-SHELL", "if [ \"$$LOCAL_STT_SOCKET_MODE\" = uds ]; then curl -fsS --unix-socket \"$${LOCAL_STT_UDS_PATH:-/run/rtc-asr/stt.sock}\" http://localhost/ready; else curl -fsS http://localhost:8080/ready; fi"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10m
    volumes:
      - ./.cache/huggingface:/app/.cache/huggingface
      - rtc_asr_socket:/run/rtc-asr
    restart: unless-stopped


  browser-pipecat-demo:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
        ENABLE_PIPECAT_DEMO_RUNTIME: 1
    depends_on:
      asr-service:
        condition: service_healthy
    environment:
      RTC_ASR_WS_URL: ws://asr-service:8080/v1/stt/stream
      RTC_ASR_CHUNK_MS: ${RTC_ASR_CHUNK_MS:-100}
      RTC_ASR_MAX_BUFFER_SECONDS: ${RTC_ASR_MAX_BUFFER_SECONDS:-5}
      LOCAL_STT_TRANSPORT: ${LOCAL_STT_TRANSPORT:-tcp_ws}
      LOCAL_STT_UDS_PATH: ${LOCAL_STT_UDS_PATH:-/run/rtc-asr/stt.sock}
      LOCAL_STT_RAW_UDS_PATH: ${LOCAL_STT_RAW_UDS_PATH:-/run/rtc-asr/stt.raw.sock}
    command: ["uvicorn", "examples.browser_pipecat_demo.service.app:app", "--host", "0.0.0.0", "--port", "8090"]
    ports:
      - "${PIPECAT_DEMO_PORT:-8090}:8090"
    volumes:
      - rtc_asr_socket:/run/rtc-asr
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/rtc-asr/config"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  rtc_asr_socket:
