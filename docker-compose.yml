services:
  asr-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
        ENABLE_PARAKEET_RUNTIME: ${ENABLE_PARAKEET_RUNTIME:-}
        ENABLE_NEMO_RUNTIME: ${ENABLE_NEMO_RUNTIME:-}
    env_file:
      - path: .env
        required: false
    ports:
      - "${PORT:-8080}:8080"
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8080}
      SAMPLE_RATE: ${SAMPLE_RATE:-16000}
      ASR_BACKEND: ${ASR_BACKEND:-faster-whisper}
      ASR_MODEL_SIZE: ${ASR_MODEL_SIZE:-small.en}
      ASR_DEVICE: ${ASR_DEVICE:-cpu}
      ASR_COMPUTE_TYPE: ${ASR_COMPUTE_TYPE:-int8}
      ASR_VAD_FILTER: ${ASR_VAD_FILTER:-true}
      ASR_PRELOAD_MODEL: ${ASR_PRELOAD_MODEL:-true}
      ASR_QWEN_MODEL: ${ASR_QWEN_MODEL:-Qwen/Qwen3-ASR-0.6B}
      ASR_QWEN_DTYPE: ${ASR_QWEN_DTYPE:-auto}
      ASR_QWEN_DEVICE_MAP: ${ASR_QWEN_DEVICE_MAP:-}
      ASR_QWEN_MAX_NEW_TOKENS: ${ASR_QWEN_MAX_NEW_TOKENS:-256}
      ASR_QWEN_MAX_INFERENCE_BATCH_SIZE: ${ASR_QWEN_MAX_INFERENCE_BATCH_SIZE:-1}
      ASR_PARAKEET_MODEL: ${ASR_PARAKEET_MODEL:-nvidia/parakeet-tdt-0.6b-v3}
      ASR_PARAKEET_DTYPE: ${ASR_PARAKEET_DTYPE:-auto}
      ASR_ULTRAVOX_MODEL: ${ASR_ULTRAVOX_MODEL:-fixie-ai/ultravox-v0_6-llama-3_1-8b}
      ASR_ULTRAVOX_DTYPE: ${ASR_ULTRAVOX_DTYPE:-auto}
      ASR_ULTRAVOX_MAX_NEW_TOKENS: ${ASR_ULTRAVOX_MAX_NEW_TOKENS:-128}
      ASR_ULTRAVOX_PROMPT: ${ASR_ULTRAVOX_PROMPT:-Transcribe the spoken audio exactly and return only the transcript.}
      HF_HOME: /app/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /app/.cache/huggingface/hub
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN:-}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10m
    volumes:
      - ./.cache/huggingface:/app/.cache/huggingface
    restart: unless-stopped
