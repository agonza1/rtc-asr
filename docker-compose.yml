version: '3.8'

services:
  asr-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - MODEL_NAME=${MODEL_NAME:-Qwen/Qwen3-ASR-1.7B}
      - MODEL_PATH=${MODEL_PATH:-/models/Qwen3-ASR-1.7B}
      - USE_WHISPER_FALLBACK=${USE_WHISPER_FALLBACK:-true}
      - AUDIO_SAMPLE_RATE=${AUDIO_SAMPLE_RATE:-16000}
      - AUDIO_CHUNK_SIZE=${AUDIO_CHUNK_SIZE:-1024}
      - MAX_LATENCY_MS=${MAX_LATENCY_MS:-500}
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8080}
      - WORKERS=${WORKERS:-1}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    volumes:
      - model_data:/models
      - ./config:/app/config:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  model_data:
    name: realtime-asr-models
    driver: local
