version: "3.8"

services:
  asr-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8080}
      - SAMPLE_RATE=${SAMPLE_RATE:-16000}
      - ASR_MODEL_SIZE=${ASR_MODEL_SIZE:-small.en}
      - ASR_DEVICE=${ASR_DEVICE:-cuda}
      - ASR_COMPUTE_TYPE=${ASR_COMPUTE_TYPE:-float16}
      - ASR_VAD_FILTER=${ASR_VAD_FILTER:-true}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    volumes:
      - model_data:/models
      - ./config:/app/config:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  model_data:
    name: realtime-asr-models
    driver: local
