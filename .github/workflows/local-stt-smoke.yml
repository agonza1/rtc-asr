name: Local STT smoke benchmark

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  fake-local-stt-pipecat-smoke:
    name: Fake Local STT/Pipecat smoke benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install smoke test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pydantic pytest websockets

      - name: Run fake Local STT/Pipecat smoke benchmark tests
        run: |
          python -m pytest \
            pipecat-local-stt/tests/test_service_fake_server.py \
            pipecat-local-stt/tests/test_service_latency_smoke.py \
            tests/test_bench_local_stt_stream.py \
            -q
