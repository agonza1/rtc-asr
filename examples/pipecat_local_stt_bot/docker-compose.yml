services:
  rtc-asr:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
    environment:
      ASR_BACKEND: ${ASR_BACKEND:-faster-whisper}
      ASR_MODEL_SIZE: ${ASR_MODEL_SIZE:-base.en}
      ASR_DEVICE: ${ASR_DEVICE:-cpu}
      ASR_COMPUTE_TYPE: ${ASR_COMPUTE_TYPE:-int8}
      ASR_PRELOAD_MODEL: "true"
    ports:
      - "8080:8080"

  pipecat-local-stt-bot:
    image: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
    working_dir: /app
    depends_on:
      rtc-asr:
        condition: service_started
    environment:
      RTC_ASR_WS_URL: ws://rtc-asr:8080/v1/stt/stream
      LOCAL_STT_SAMPLE_RATE: "16000"
      LOCAL_STT_CHANNELS: "1"
      LOCAL_STT_FRAME_MS: "20"
      LOCAL_STT_PARTIAL_INTERVAL_MS: "100"
      LOCAL_STT_PARTIAL_WINDOW_SECONDS: "1.0"
    volumes:
      - ../..:/app
    command: >-
      sh -lc "pip install -r examples/pipecat_local_stt_bot/requirements.txt &&
      python examples/pipecat_local_stt_bot/bot.py"
